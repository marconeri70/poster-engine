<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>3D Pen Template Creator</title>
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0a; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .toolbar { padding: 20px; background: #1a1a1a; display: flex; gap: 20px; align-items: center; border-bottom: 1px solid #333; }
        .canvas-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 20px; }
        canvas { background: white; box-shadow: 0 0 30px rgba(0,0,0,0.5); max-width: 100%; }
        .btn { padding: 10px 20px; background: var(--accent); color: black; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        input[type="range"] { accent-color: var(--accent); }
    </style>
</head>
<body>
    <div class="toolbar">
        <input type="file" id="upload" accept="image/*">
        <div>
            <label>Dettaglio Linee</label>
            <input type="range" id="threshold" min="0" max="255" value="128">
        </div>
        <button class="btn" id="saveBtn">Salva PNG per Poster</button>
        <a href="index.html" style="color: #888; text-decoration: none; font-size: 12px;">← Torna al Poster Engine</a>
    </div>
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const threshold = document.getElementById('threshold');
        let originalImage = null;

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    canvas.width = img.width;
                    canvas.height = img.height;
                    processImage();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        threshold.addEventListener('input', processImage);

        function processImage() {
            if (!originalImage) return;
            ctx.drawImage(originalImage, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const thresh = threshold.value;

            for (let i = 0; i < data.length; i += 4) {
                // Conversione in scala di grigi (Luminanza)
                const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                // Effetto soglia (Bianco o Nero)
                const val = avg > thresh ? 255 : 0;
                data[i] = data[i+1] = data[i+2] = val;
            }
            ctx.putImageData(imageData, 0, 0);
        }

        document.getElementById('saveBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'template-3d-pen.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    </script>
</body>
</html>
