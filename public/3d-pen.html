<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>3D Pen - Filament Path Creator</title>
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0a; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .toolbar { padding: 15px; background: #1a1a1a; display: flex; gap: 20px; align-items: center; border-bottom: 1px solid #333; z-index: 100; }
        .control { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 10px; text-transform: uppercase; color: #888; }
        .btn { padding: 10px 20px; background: var(--accent); color: black; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .main-view { flex-grow: 1; position: relative; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #drawingBoard { position: relative; transform-origin: center; }
        canvas { background: white; filter: contrast(1.2); }
        input[type="range"] { accent-color: var(--accent); }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="control">
            <label>1. Foto</label>
            <input type="file" id="upload" accept="image/*">
        </div>
        <div class="control">
            <label>🔍 Zoom</label>
            <input type="range" id="zoomBoard" min="0.1" max="2" step="0.1" value="0.6">
        </div>
        <div class="control">
            <label>Spessore Tratto (Filamento)</label>
            <input type="range" id="threshold" min="10" max="150" value="50">
        </div>
        <button class="btn" id="saveBtn">Esporta per Penna 3D</button>
        <a href="/poster-engine/index.html" style="color: var(--accent); text-decoration: none; font-size: 12px; margin-left: auto;">← Poster Engine</a>
    </div>

    <div class="main-view">
        <div id="drawingBoard">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const threshold = document.getElementById('threshold');
        const zoomBoard = document.getElementById('zoomBoard');
        const drawingBoard = document.getElementById('drawingBoard');
        let originalImage = null;

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    canvas.width = img.width;
                    canvas.height = img.height;
                    processImage();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        zoomBoard.addEventListener('input', () => {
            drawingBoard.style.transform = `scale(${zoomBoard.value})`;
        });

        threshold.addEventListener('input', processImage);

        function processImage() {
            if (!originalImage) return;
            
            // 1. Disegno base e sfocatura per unire i puntini
            ctx.filter = "grayscale(100%) blur(2px)";
            ctx.drawImage(originalImage, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const w = canvas.width;
            const h = canvas.height;
            const t = parseInt(threshold.value);

            // 2. Buffer temporaneo per i contorni
            const output = new Uint8ClampedArray(data.length);

            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const i = (y * w + x) * 4;
                    
                    // Algoritmo di Edge Detection semplificato (Sobel)
                    // Calcola la variazione di luminosità tra pixel vicini
                    const diff = Math.abs(data[i] - data[i + 4]) + Math.abs(data[i] - data[i + (w * 4)]);
                    
                    const val = diff > t ? 0 : 255; // Nero per il filamento, bianco per il fondo
                    
                    output[i] = output[i+1] = output[i+2] = val;
                    output[i+3] = 255;
                }
            }
            
            ctx.filter = "none";
            imageData.data.set(output);
            ctx.putImageData(imageData, 0, 0);
            drawingBoard.style.transform = `scale(${zoomBoard.value})`;
        }

        document.getElementById('saveBtn').addEventListener('click', () => {
            if(!originalImage) return;
            const link = document.createElement('a');
            link.download = 'percorso-penna-3d.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    </script>
</body>
</html>
