<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>3D Pen - Organic Path Creator</title>
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0a; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .toolbar { padding: 15px; background: #1a1a1a; display: flex; gap: 15px; align-items: center; border-bottom: 1px solid #333; z-index: 100; }
        .control { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 9px; text-transform: uppercase; color: #888; }
        .btn { padding: 10px 20px; background: var(--accent); color: black; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .main-view { flex-grow: 1; position: relative; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #drawingBoard { position: relative; transform-origin: center; }
        canvas { background: white; display: block; }
        input[type="range"] { accent-color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="control"><label>1. Foto</label><input type="file" id="upload" accept="image/*"></div>
        <div class="control"><label>🔍 Zoom</label><input type="range" id="zoomBoard" min="0.1" max="2" step="0.1" value="0.7"></div>
        <div class="control"><label>Fluidità Percorso</label><input type="range" id="smoothing" min="1" max="10" value="3"></div>
        <div class="control"><label>Densità</label><input type="range" id="threshold" min="50" max="220" value="150"></div>
        <button class="btn" id="saveBtn">Salva Tracciato</button>
        <a href="/poster-engine/index.html" style="color: var(--accent); text-decoration: none; font-size: 11px; margin-left: auto;">← Poster Engine</a>
    </div>
    <div class="main-view"><div id="drawingBoard"><canvas id="canvas"></canvas></div></div>
    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const threshold = document.getElementById('threshold');
        const smoothing = document.getElementById('smoothing');
        const zoomBoard = document.getElementById('zoomBoard');
        const drawingBoard = document.getElementById('drawingBoard');
        let originalImage = null;

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    canvas.width = img.width; canvas.height = img.height;
                    processImage();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        const updateZoom = () => drawingBoard.style.transform = `scale(${zoomBoard.value})`;
        zoomBoard.addEventListener('input', updateZoom);
        [threshold, smoothing].forEach(el => el.addEventListener('input', processImage));

        function processImage() {
            if (!originalImage) return;
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImage, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = "black"; ctx.lineWidth = 2; ctx.lineCap = "round"; ctx.beginPath();
            const step = parseInt(smoothing.value);
            const thresh = parseInt(threshold.value);

            for (let y = 0; y < canvas.height; y += step) {
                let active = false;
                for (let x = 0; x < canvas.width; x++) {
                    const brightness = (data[(y * canvas.width + x) * 4] + data[(y * canvas.width + x) * 4 + 1] + data[(y * canvas.width + x) * 4 + 2]) / 3;
                    if (brightness < thresh) {
                        if (!active) { ctx.moveTo(x, y); active = true; }
                        else { ctx.lineTo(x, y); }
                    } else { active = false; }
                }
            }
            ctx.stroke(); updateZoom();
        }

        document.getElementById('saveBtn').addEventListener('click', () => {
            if(!originalImage) return;
            const link = document.createElement('a');
            link.download = 'percorso_3dpenna.png';
            link.href = canvas.toDataURL(); link.click();
        });
    </script>
</body>
</html>
