<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>3D Pen - Crosshatch Filament</title>
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0a; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .toolbar { padding: 15px; background: #1a1a1a; display: flex; gap: 15px; align-items: center; border-bottom: 1px solid #333; z-index: 100; flex-wrap: wrap; }
        .control { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 9px; text-transform: uppercase; color: #888; letter-spacing: 1px; }
        .btn { padding: 10px 20px; background: var(--accent); color: black; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .main-view { flex-grow: 1; position: relative; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #drawingBoard { position: relative; transform-origin: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        canvas { background: white; display: block; }
        input[type="range"] { accent-color: var(--accent); width: 100px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="control"><label>1. Carica Foto</label><input type="file" id="upload" accept="image/*"></div>
        <div class="control"><label>🔍 Zoom</label><input type="range" id="zoomBoard" min="0.1" max="2" step="0.1" value="0.7"></div>
        <div class="control"><label>Spaziatura</label><input type="range" id="lineSpacing" min="3" max="25" value="8"></div>
        <div class="control"><label>Dettaglio</label><input type="range" id="detail" min="50" max="200" value="130"></div>
        <button class="btn" id="saveBtn">Salva per Penna 3D</button>
        <a href="/poster-engine/index.html" style="color: var(--accent); text-decoration: none; font-size: 10px; margin-left: auto;">← Poster Engine</a>
    </div>

    <div class="main-view"><div id="drawingBoard"><canvas id="canvas"></canvas></div></div>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const lineSpacingInput = document.getElementById('lineSpacing');
        const detailInput = document.getElementById('detail');
        const zoomBoard = document.getElementById('zoomBoard');
        const drawingBoard = document.getElementById('drawingBoard');
        let originalImage = null;

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    canvas.width = img.width; canvas.height = img.height;
                    processImage();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        const updateZoom = () => drawingBoard.style.transform = `scale(${zoomBoard.value})`;
        zoomBoard.addEventListener('input', updateZoom);
        [lineSpacingInput, detailInput].forEach(el => el.addEventListener('input', processImage));

        function processImage() {
            if (!originalImage) return;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.filter = "grayscale(100%) contrast(150%) blur(1px)";
            tempCtx.drawImage(originalImage, 0, 0);
            
            const imageData = tempCtx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const w = canvas.width; const h = canvas.height;

            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, w, h);
            ctx.strokeStyle = "black";
            ctx.lineWidth = 2;
            const spacing = parseInt(lineSpacingInput.value);
            const threshold = parseInt(detailInput.value);

            ctx.beginPath();
            // Passata Orizzontale
            for (let y = 0; y < h; y += spacing) {
                let startX = -1;
                for (let x = 0; x < w; x++) {
                    const brightness = data[(y * w + x) * 4];
                    if (brightness < threshold) {
                        if (startX === -1) startX = x;
                    } else if (startX !== -1) {
                        if (x - startX > 3) { ctx.moveTo(startX, y); ctx.lineTo(x, y); }
                        startX = -1;
                    }
                }
            }
            // Passata Verticale (Crea la struttura a rete)
            for (let x = 0; x < w; x += spacing) {
                let startY = -1;
                for (let y = 0; y < h; y++) {
                    const brightness = data[(y * w + x) * 4];
                    if (brightness < threshold) {
                        if (startY === -1) startY = y;
                    } else if (startY !== -1) {
                        if (y - startY > 3) { ctx.moveTo(x, startY); ctx.lineTo(x, y); }
                        startY = -1;
                    }
                }
            }
            ctx.stroke();
            updateZoom();
        }

        document.getElementById('saveBtn').addEventListener('click', () => {
            if(!originalImage) return;
            const link = document.createElement('a');
            link.download = '3d_pen_mesh.png';
            link.href = canvas.toDataURL(); link.click();
        });
    </script>
</body>
</html>
