<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poster Engine Pro v6</title>
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="/poster-engine/manifest.json">
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0a; --card: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .sidebar { padding: 15px; background: var(--card); z-index: 200; box-shadow: 0 0 20px rgba(0,0,0,0.5); flex-shrink: 0; overflow-y: auto; }
        @media (min-width: 768px) { body { flex-direction: row; } .sidebar { width: 280px; height: 100vh; } }
        
        h1 { font-size: 1.1rem; color: var(--accent); margin: 0 0 15px 0; text-align: center; font-weight: 900; }
        .control-group { margin-bottom: 12px; }
        label { display: block; font-size: 9px; text-transform: uppercase; color: #888; margin-bottom: 4px; }
        input { width: 100%; background: #222; border: 1px solid #333; padding: 10px; color: white; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        input[type="range"] { accent-color: var(--accent); }
        
        #generateBtn { width: 100%; padding: 15px; background: var(--accent); color: black; border: none; font-weight: 800; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        
        /* Area di lavoro infinita */
        .main-view { flex-grow: 1; position: relative; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        
        /* Tavolo da disegno (che possiamo zoomare) */
        #drawingBoard { position: relative; transform-origin: center; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; }

        /* Cornice di stampa (Il bersaglio) */
        #posterFrame { position: relative; border: 2px solid var(--accent); background: rgba(0,255,136,0.05); z-index: 10; pointer-events: none; box-shadow: 0 0 0 2000px rgba(0,0,0,0.7); }

        /* Contenitore Immagine (Sotto la cornice) */
        #imageWrapper { position: absolute; z-index: 5; transform-origin: top left; }
        #movableImage { width: 100%; height: 100%; object-fit: fill; opacity: 0.8; user-select: none; pointer-events: none; border: 1px dashed rgba(255,255,255,0.3); }

        /* Le maniglie devono stare sopra l'immagine e seguirne i bordi */
        .handle { position: absolute; width: 22px; height: 22px; background: white; border: 3px solid var(--accent); border-radius: 50%; z-index: 100; pointer-events: all; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .handle.tl { top: -11px; left: -11px; } .handle.tm { top: -11px; left: 50%; transform: translateX(-50%); } .handle.tr { top: -11px; right: -11px; }
        .handle.ml { top: 50%; left: -11px; transform: translateY(-50%); } .handle.mr { top: 50%; right: -11px; transform: translateY(-50%); }
        .handle.bl { bottom: -11px; left: -11px; } .handle.bm { bottom: -11px; left: 50%; transform: translateX(-50%); } .handle.br { bottom: -11px; right: -11px; }

        #gridOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; z-index: 15; }
        .grid-line { border: 1px solid rgba(0, 255, 136, 0.2); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>POSTER PRO v6</h1>
        <div class="control-group">
            <label>1. Zoom Tavolo Lavoro</label>
            <input type="range" id="zoomBoard" min="0.1" max="2" step="0.1" value="0.5">
        </div>
        <div class="control-group">
            <label>2. Foto Sorgente</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        <div class="control-group">
            <label>3. Larghezza Muro (mm)</label>
            <input type="number" id="targetWidth" value="1000">
        </div>
        <div class="control-group">
            <label>4. Altezza Muro (mm)</label>
            <input type="number" id="targetHeight" value="1000">
        </div>
        <div class="control-group">
            <label>5. Sovrapposizione (mm)</label>
            <input type="number" id="overlap" value="15">
        </div>
        <button id="generateBtn">Esporta PDF Finale</button>
    </div>
    
    <div class="main-view">
        <div id="drawingBoard">
            <div id="imageWrapper" style="display:none;">
                <img id="movableImage">
                <div class="handle tl" data-h="tl"></div>
                <div class="handle tm" data-h="tm"></div>
                <div class="handle tr" data-h="tr"></div>
                <div class="handle ml" data-h="ml"></div>
                <div class="handle mr" data-h="mr"></div>
                <div class="handle bl" data-h="bl"></div>
                <div class="handle bm" data-h="bm"></div>
                <div class="handle br" data-h="br"></div>
            </div>
            <div id="posterFrame">
                <div id="gridOverlay"></div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
