<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poster Engine Pro v2</title>
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0a; --card: #1a1a1a; --danger: #ff4444; --info: #4444ff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }
        
        .sidebar { padding: 20px; background: var(--card); z-index: 10; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        @media (min-width: 768px) { body { flex-direction: row; } .sidebar { width: 320px; height: 100vh; } }
        
        h1 { font-size: 1.2rem; color: var(--accent); margin: 0 0 20px 0; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; text-transform: uppercase; color: #888; margin-bottom: 5px; }
        input { width: 100%; background: #2a2a2a; border: 1px solid #3a3a3a; padding: 10px; color: white; border-radius: 4px; box-sizing: border-box; }
        
        #generateBtn { width: 100%; padding: 12px; background: var(--accent); color: black; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        .main-view { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(#222 1px, transparent 1px); background-size: 20px 20px; overflow: auto; padding: 50px; }
        
        .preview-wrapper { position: relative; display: inline-block; border: 2px solid #444; transition: border-color 0.2s; }
        .preview-wrapper.active { border-color: var(--accent); }
        
        #previewContainer { display: grid; gap: 2px; pointer-events: none; }
        .preview-tile { background-size: cover; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .preview-tile::after { content: attr(data-coord); position: absolute; top: 2px; left: 2px; font-size: 8px; background: rgba(0,0,0,0.7); padding: 1px 3px; color: var(--accent); }

        /* Resizer Handles */
        .resizer { position: absolute; width: 24px; height: 24px; background: var(--accent); border-radius: 50%; bottom: -12px; right: -12px; cursor: nwse-resize; z-index: 100; box-shadow: 0 0 15px rgba(0,255,136,0.5); display: flex; align-items: center; justify-content: center; }
        .resizer::after { content: '↘'; color: black; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>POSTER PRO v2</h1>
        <div class="control-group">
            <label>Scegli Immagine</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        <div class="control-group">
            <label>Larghezza (mm)</label>
            <input type="number" id="targetWidth" value="600">
        </div>
        <div class="control-group">
            <label>Altezza (mm)</label>
            <input type="number" id="targetHeight" value="900">
        </div>
        <div class="control-group">
            <label>Sovrapposizione (mm)</label>
            <input type="number" id="overlap" value="15">
        </div>
        <button id="generateBtn">Scarica PDF per Stampa</button>
        <p style="font-size: 10px; color: #666; margin-top: 20px;">Trascina il cerchio verde nell'anteprima per ridimensionare.</p>
    </div>
    
    <div class="main-view">
        <div class="preview-wrapper" id="interactWrapper">
            <div id="previewContainer"></div>
            <div class="resizer" id="resizeHandle"></div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
