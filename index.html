<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poster Engine Pro v4</title>
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0a; --card: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .sidebar { padding: 20px; background: var(--card); z-index: 100; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        @media (min-width: 768px) { body { flex-direction: row; } .sidebar { width: 320px; height: 100vh; } }
        
        h1 { font-size: 1.2rem; color: var(--accent); margin: 0 0 20px 0; text-align: center; font-weight: 800; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; text-transform: uppercase; color: #888; margin-bottom: 5px; }
        input { width: 100%; background: #2a2a2a; border: 1px solid #3a3a3a; padding: 10px; color: white; border-radius: 4px; box-sizing: border-box; }
        
        #generateBtn { width: 100%; padding: 15px; background: var(--accent); color: black; border: none; font-weight: 800; border-radius: 4px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        #generateBtn:disabled { background: #444; cursor: not-allowed; }

        .main-view { flex-grow: 1; position: relative; background: radial-gradient(#222 1px, transparent 1px); background-size: 20px 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        
        #posterFrame { position: relative; border: 2px solid var(--accent); background: #000; overflow: hidden; }

        #imageWrapper { position: absolute; top: 0; left: 0; cursor: move; }
        #movableImage { width: 100%; height: 100%; object-fit: fill; user-select: none; pointer-events: none; }

        /* Le 8 Maniglie */
        .handle { position: absolute; width: 16px; height: 16px; background: white; border: 2px solid var(--accent); border-radius: 50%; z-index: 100; }
        .handle.tl { top: -8px; left: -8px; cursor: nw-resize; }
        .handle.tm { top: -8px; left: 50%; transform: translateX(-50%); cursor: n-resize; }
        .handle.tr { top: -8px; right: -8px; cursor: ne-resize; }
        .handle.ml { top: 50%; left: -8px; transform: translateY(-50%); cursor: w-resize; }
        .handle.mr { top: 50%; right: -8px; transform: translateY(-50%); cursor: e-resize; }
        .handle.bl { bottom: -8px; left: -8px; cursor: sw-resize; }
        .handle.bm { bottom: -8px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
        .handle.br { bottom: -8px; right: -8px; cursor: se-resize; }

        #gridOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; pointer-events: none; z-index: 50; }
        .grid-line { border: 1px solid rgba(0, 255, 136, 0.2); position: relative; box-sizing: border-box; }
        .grid-line::after { content: attr(data-id); position: absolute; top: 2px; left: 2px; font-size: 9px; color: var(--accent); background: rgba(0,0,0,0.5); padding: 1px 3px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>POSTER PRO v4</h1>
        <div class="control-group">
            <label>1. Carica Foto</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        <div class="control-group">
            <label>2. Larghezza Superficie (mm)</label>
            <input type="number" id="targetWidth" value="1000">
        </div>
        <div class="control-group">
            <label>3. Altezza Superficie (mm)</label>
            <input type="number" id="targetHeight" value="1000">
        </div>
        <div class="control-group">
            <label>4. Sovrapposizione (mm)</label>
            <input type="number" id="overlap" value="15">
        </div>
        <button id="generateBtn">Scarica PDF Distorto</button>
        <p style="font-size: 10px; color: #888; margin-top: 15px;">
            <b>Istruzioni:</b> Trascina le maniglie bianche sui lati e sugli angoli per distorcere l'immagine e adattarla alla cornice verde.
        </p>
    </div>
    
    <div class="main-view">
        <div id="posterFrame">
            <div id="imageWrapper" style="display:none;">
                <img id="movableImage">
                <div class="handle tl" data-h="tl"></div>
                <div class="handle tm" data-h="tm"></div>
                <div class="handle tr" data-h="tr"></div>
                <div class="handle ml" data-h="ml"></div>
                <div class="handle mr" data-h="mr"></div>
                <div class="handle bl" data-h="bl"></div>
                <div class="handle bm" data-h="bm"></div>
                <div class="handle br" data-h="br"></div>
            </div>
            <div id="gridOverlay"></div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
